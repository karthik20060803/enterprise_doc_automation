services:
  - type: web
    name: enterprise-doc-automation
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install setuptools wheel && pip install -r requirements-render.txt
    startCommand: python -m waitress --port=$PORT web_frontend:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: IDP_FRONTEND_DEBUG
        value: "false"
