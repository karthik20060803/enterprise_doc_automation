services:
  - type: web
    name: enterprise-doc-automation
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install setuptools wheel && pip install gunicorn==22.0.0 && pip install -r requirements-render.txt
    startCommand: python -m gunicorn --bind 0.0.0.0:$PORT web_frontend:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: IDP_FRONTEND_DEBUG
        value: "false"
